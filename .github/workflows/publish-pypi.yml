name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish
        required: true
        default: v0.4.5
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve release ref
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ref.outputs.tag }}
    steps:
      - name: Resolve tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  dist:
    name: Build distributions
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check tag matches project version
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]

          expected = f"v{version}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(
                  f"release tag {actual!r} does not match project version "
                  f"{version!r}; expected {expected!r}"
              )
          PY

      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --wheel --outdir dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs:
      - dist
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine pkginfo
          python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
